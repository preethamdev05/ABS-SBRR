name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint (MicroPython-safe)
        run: |
          ruff check . \
            --select E,F,W \
            --ignore E501,F841,F401 \
            --exclude .git,.github,.venv

      - name: Validate JSON configs
        run: |
          for f in config.json wifi.json schedule.json diagram.json; do
            if [ -f "$f" ]; then
              python3 -m json.tool "$f" > /dev/null && echo "✓ $f valid" || { echo "✗ $f invalid"; exit 1; }
            fi
          done

      - name: MicroPython syntax check
        run: |
          for f in *.py; do
            python3 -c "
          import ast, sys
          try:
              with open('$f') as fh:
                  ast.parse(fh.read(), filename='$f')
              print('✓ $f')
          except SyntaxError as e:
              print(f'✗ $f: {e}')
              sys.exit(1)
          " || exit 1
          done
